name: Compilar APK de Android

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el proyecto
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Dar permisos de ejecución a Gradle
      run: chmod +x gradlew

    # 1. Recuperar el Keystore real desde los secretos de GitHub
    - name: Decodificar Keystore
      run: echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 --decode > app/my-upload-key.keystore

    # 2. Recuperar el google-services.json real
    - name: Crear google-services.json
      run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

    # 3. Inyectar el Web Client ID en los strings de Android para el Login
    - name: Configurar Web Client ID
      run: |
        mkdir -p app/src/main/res/values
        echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">UTKNotes IA</string><string name="default_web_client_id">${{ secrets.WEB_CLIENT_ID }}</string></resources>' > app/src/main/res/values/strings.xml

    # 4. Compilar APK de Release (Producción) firmada
    - name: Compilar APK de Release
      env:
        ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_FILE: my-upload-key.keystore
        ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --no-daemon

    # 5. Guardar y subir el archivo APK resultante
    - name: Subir el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: UTKNotes_IA_Release
        path: app/build/outputs/apk/release/*.apk
