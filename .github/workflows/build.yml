name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Google Services Configuration
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "Successfully wrote app/google-services.json"
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret is not set. Google Sign-In might not work correctly."
          fi

      - name: Setup Release Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > my-upload-key.keystore
            echo "Successfully restored Release Keystore file."
          else
            echo "WARNING: RELEASE_KEYSTORE_BASE64 secret is not set. Release APK signing will be skipped if keystore is missing."
          fi

      - name: Make Gradle Wrapper Executable
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, generating wrapper using local gradle installation..."
            gradle wrapper --gradle-version 9.3.1
          fi
          # Convierte terminaciones de línea CRLF a LF (útil si subes cambios desde Windows)
          sed -i -e 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build with Gradle
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: "my-key-alias"
          KEYSTORE_PATH: "my-upload-key.keystore"
        run: |
          if [ -f "my-upload-key.keystore" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "Building signed Release APK..."
            ./gradlew assembleRelease --no-daemon
          else
            echo "Keystore or passwords missing, building Debug APK instead..."
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UTKNotes-Apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
