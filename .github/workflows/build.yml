name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Google Services Configuration
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          python3 -c '
          import os, json, base64

          secret = os.environ.get("GOOGLE_SERVICES_JSON", "").strip()
          out_path = "app/google-services.json"

          dummy_json = {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "mock-project-id",
              "storage_bucket": "mock-project-id.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:mockappid",
                  "android_client_info": {
                    "package_name": "utk.notes.ia"
                  }
                },
                "oauth_client": [
                  {
                    "client_id": "mock-client-id.apps.googleusercontent.com",
                    "client_type": 3
                  }
                ],
                "api_key": [
                  {
                    "current_key": "mock-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }

          def try_parse_json(content):
              try:
                  return json.loads(content)
              except Exception:
                  return None

          parsed = None
          if secret:
              parsed = try_parse_json(secret)
              if parsed is not None:
                  print("Successfully parsed GOOGLE_SERVICES_JSON directly as plain JSON.")
              else:
                  try:
                      decoded = base64.b64decode(secret).decode("utf-8")
                      parsed = try_parse_json(decoded)
                      if parsed is not None:
                          print("Successfully decoded and parsed GOOGLE_SERVICES_JSON from Base64.")
                  except Exception:
                      pass

          if parsed is None:
              print("WARNING: GOOGLE_SERVICES_JSON secret is not set, or is invalid/malformed. Using fallback placeholder JSON.")
              parsed = dummy_json

          with open(out_path, "w") as f:
              json.dump(parsed, f, indent=2)
          print("Saved google-services.json successfully.")
          '

      - name: Ensure Required Android Resources Exist
        run: |
          python3 -c '
          import os, base64

          res_files = {
              "app/src/main/res/xml/data_extraction_rules.xml": """<?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup>
              </cloud-backup>
          </data-extraction-rules>""",
              
              "app/src/main/res/xml/backup_rules.xml": """<?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
          </full-backup-content>""",
              
              "app/src/main/res/xml/file_paths.xml": """<?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <cache-path name="shared_pdf" path="." />
          </paths>""",
              
              "app/src/main/res/values/strings.xml": """<resources>
              <string name="app_name">UTK Notes - IA</string>
          </resources>""",
              
              "app/src/main/res/values/themes.xml": """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.MyApplication" parent="android:Theme.DeviceDefault.NoActionBar" />
          </resources>""",
              
              "app/src/main/res/values/colors.xml": """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="purple_200">#FFBB86FC</color>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="teal_200">#FF03DAC5</color>
              <color name="teal_700">#FF018786</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
          </resources>""",
              
              "app/src/main/res/drawable/ic_launcher_background.xml": """<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#1C1B1F"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>""",
              
              "app/src/main/res/drawable/ic_launcher_foreground.xml": """<?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item
                  android:width="72dp"
                  android:height="72dp"
                  android:drawable="@drawable/img_app_icon_1784256719197"
                  android:gravity="center" />
          </layer-list>""",
              
              "app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml": """<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>""",
              
              "app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml": """<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>"""
          }

          # Ensure all parent directories exist
          for path, content in res_files.items():
              if not os.path.exists(path):
                  os.makedirs(os.path.dirname(path), exist_ok=True)
                  with open(path, "w") as f:
                      f.write(content)
                  print(f"Restored missing resource file: {path}")
              else:
                  print(f"Resource file already exists: {path}")

          # Check for img_app_icon_1784256719197.png and write fallback 1x1 png if missing
          png_path = "app/src/main/res/drawable/img_app_icon_1784256719197.png"
          if not os.path.exists(png_path):
              os.makedirs(os.path.dirname(png_path), exist_ok=True)
              fallback_png_b64 = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="
              with open(png_path, "wb") as f:
                  f.write(base64.b64decode(fallback_png_b64.encode("utf-8")))
              print(f"Restored missing app icon image file: {png_path}")
          '

      - name: Setup Release Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > my-upload-key.keystore
            echo "Successfully restored Release Keystore file."
          else
            echo "WARNING: RELEASE_KEYSTORE_BASE64 secret is not set. Release APK signing will be skipped if keystore is missing."
          fi

      - name: Setup Debug Keystore
        run: |
          if [ ! -f "debug.keystore" ]; then
            echo "debug.keystore not found, generating a new one..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Regenerate Gradle Wrapper
        run: |
          echo "Force-regenerating Gradle wrapper to prevent corrupt jar errors..."
          gradle wrapper --gradle-version 9.3.1
          # Convert CRLF to LF in case of Windows line endings
          sed -i -e 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build with Gradle
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: "my-key-alias"
          KEYSTORE_PATH: "my-upload-key.keystore"
        run: |
          if [ -f "my-upload-key.keystore" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "Building signed Release APK..."
            ./gradlew assembleRelease --no-daemon
          else
            echo "Keystore or passwords missing, building Debug APK instead..."
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UTKNotes-Apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
