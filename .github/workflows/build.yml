name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Google Services Configuration
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "Successfully wrote app/google-services.json from secret"
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret is not set. Generating a placeholder/mock google-services.json to allow compilation..."
            cat << 'EOF' > app/google-services.json
            {
              "project_info": {
                "project_number": "1234567890",
                "project_id": "mock-project-id",
                "storage_bucket": "mock-project-id.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:1234567890:android:mockappid",
                    "android_client_info": {
                      "package_name": "utk.notes.ia"
                    }
                  },
                  "oauth_client": [
                    {
                      "client_id": "mock-client-id.apps.googleusercontent.com",
                      "client_type": 3
                    }
                  ],
                  "api_key": [
                    {
                      "current_key": "mock-api-key"
                    }
                  ],
                  "services": {
                    "appinvite_service": {
                      "other_platform_oauth_client": []
                    }
                  }
                }
              ],
              "configuration_version": "1"
            }
            EOF
            echo "Successfully generated dummy app/google-services.json"
          fi

      - name: Setup Release Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > my-upload-key.keystore
            echo "Successfully restored Release Keystore file."
          else
            echo "WARNING: RELEASE_KEYSTORE_BASE64 secret is not set. Release APK signing will be skipped if keystore is missing."
          fi

      - name: Setup Debug Keystore
        run: |
          if [ ! -f "debug.keystore" ]; then
            echo "debug.keystore not found, generating a new one..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Regenerate Gradle Wrapper
        run: |
          echo "Force-regenerating Gradle wrapper to prevent corrupt jar errors..."
          gradle wrapper --gradle-version 9.3.1
          # Convert CRLF to LF in case of Windows line endings
          sed -i -e 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build with Gradle
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: "my-key-alias"
          KEYSTORE_PATH: "my-upload-key.keystore"
        run: |
          if [ -f "my-upload-key.keystore" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "Building signed Release APK..."
            ./gradlew assembleRelease --no-daemon
          else
            echo "Keystore or passwords missing, building Debug APK instead..."
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UTKNotes-Apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
